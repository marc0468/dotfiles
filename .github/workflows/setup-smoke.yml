name: setup-smoke

on:
  push:
    paths:
      - "setup.sh"
      - ".github/workflows/setup-smoke.yml"
  workflow_dispatch:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate script syntax
        run: bash -n ./setup.sh

      - name: Run setup smoke test
        shell: bash
        run: |
          set -euo pipefail
          export HOME="$(mktemp -d)"
          bash ./setup.sh
